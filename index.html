<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スマホ対応2レーン音ゲー (BPM150・難易度中)</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent; 
        }
        #start-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #start-btn {
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            background-color: #00ccff;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,204,255,0.5);
        }
        #game-board {
            position: relative;
            width: 100%;
            max-width: 400px; 
            height: 100%;
            background-color: #222;
            display: flex;
        }
        .lane {
            position: relative;
            flex: 1; 
            height: 100%;
            border-right: 1px dashed #444;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        .lane:last-child { border-right: none; }

        #judgment-line {
            position: absolute;
            bottom: 15%;
            width: 100%;
            height: 5px;
            background-color: rgba(255, 255, 255, 0.5);
            z-index: 10;
        }
        .note {
            position: absolute;
            width: 80%;
            height: 20px;
            background-color: #00ffcc;
            left: 10%; 
            border-radius: 4px;
            box-shadow: 0 0 8px rgba(0,255,204,0.8);
            transform: translateY(-50%);
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            z-index: 20;
            pointer-events: none; 
        }
        #score-board { font-size: 28px; font-weight: bold; }
        #feedback { height: 35px; font-size: 28px; font-weight: bold; color: yellow; margin-top: 5px; text-shadow: 0 0 5px #000; }
        
        .tap-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 15%;
            background-color: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #888;
        }
        .lane:active .tap-area {
            background-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-btn">GAME START</button>
        <p style="margin-top:20px; color:#ccc;">画面の左右をタップ<br>（PCは D / K キー）<br>※PCはスペースキーでも開始できます</p>
    </div>

    <div id="ui-layer">
        <div id="score-board">SCORE: <span id="score">0</span></div>
        <div id="feedback"></div>
    </div>
    
    <div id="game-board">
        <div class="lane" id="lane-0" data-lane="0"><div class="tap-area">TAP (L)</div></div>
        <div class="lane" id="lane-1" data-lane="1"><div class="tap-area">TAP (R)</div></div>
        <div id="judgment-line"></div>
    </div>

    <audio id="bgm" src="radio_6890.mp3"></audio>

    <script>
        // ==========================================
        // ⚙️ ゲームの各種設定
        // ==========================================
        // 教えていただいたBPM150に設定しました！
        const BPM = 150;             
        const fallTimeSec = 1.0; 
        
        // ⏱️ 音ズレ調整（秒数）
        // 音楽よりノーツが「遅れて」降ってくる場合はプラス（例: 0.1）
        // 音楽よりノーツが「早く」降ってくる場合はマイナス（例: -0.1）
        const OFFSET_SEC = 0.0;     
        // ==========================================

        const gameBoard = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score');
        const feedbackDisplay = document.getElementById('feedback');
        const bgm = document.getElementById('bgm');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        
        let score = 0;
        let chart = [];       
        let activeNotes = []; 
        let gameActive = false;
        
        let boardHeight = gameBoard.clientHeight;
        let judgmentY = boardHeight * 0.85; 

        // 🔊 Web Audio API（遅延ゼロのタップ音用）
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // タップ音を「チッ」というハッキリした音に改良
        function playTapSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'triangle'; // より耳に残りやすい波形
            osc.frequency.setValueAtTime(800, audioCtx.currentTime); // 高めの音から
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1); // 急激に下げる
            
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime); // 音量を少し上げる
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); 
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        window.addEventListener('resize', () => {
            boardHeight = gameBoard.clientHeight;
            judgmentY = boardHeight * 0.85;
        });

        // 🎼 程よい難易度の譜面パターン（連打を減らしました）
        function generateChart() {
            chart = [];
            const secPerBeat = 60 / BPM;              
            const secPerMeasure = secPerBeat * 4;     
            const totalMeasures = 100;                

            // 1小節の中で「どこにノーツを置くか」のパターン（16分割）
            // 密度を大幅に下げ、基本は四つ打ちや裏打ちにしています
            const patterns = [
                [0, 8],                   // 2つ（スッカスカな休憩地帯）
                [0, 4, 8, 12],            // 4つ（等間隔の基本リズム）
                [0, 8, 12],               // 3つ（タン・休・タン・タン）
                [0, 4, 8],                // 3つ（タン・タン・タン・休）
                [0, 6, 8, 12],            // 4つ（少しだけハネるリズム）
                [0, 8, 10, 12]            // 4つ（後半に軽快なタタン）
            ];

            for (let m = 0; m < totalMeasures; m++) {
                let measureStartTime = m * secPerMeasure;
                let selectedPattern = patterns[Math.floor(Math.random() * patterns.length)];

                for (let slot of selectedPattern) {
                    let time = measureStartTime + slot * (secPerMeasure / 16);
                    if (time > 2.0) {
                        chart.push({
                            targetTime: time,
                            lane: Math.floor(Math.random() * 2),
                            spawned: false,
                            element: null
                        });
                    }
                }
            }
            chart.sort((a, b) => a.targetTime - b.targetTime);
        }

        // ゲーム開始処理を関数化（クリックでもキーボードでも呼べるように）
        function startGame() {
            if (gameActive) return; // 既に始まっていたら無視
            
            initAudio(); 
            startScreen.style.display = 'none';
            score = 0;
            scoreDisplay.innerText = score;
            generateChart(); 
            
            gameActive = true;
            bgm.currentTime = 0;
            bgm.play();
            
            requestAnimationFrame(update);
        }

        // ボタンのクリック/タップで開始
        startBtn.addEventListener('click', startGame);
        startBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startGame();
        });

        bgm.addEventListener('ended', () => {
            gameActive = false;
            showFeedback('FINISH!', '#fff');
        });

        function update() {
            if (!gameActive) return;
            let syncTime = bgm.currentTime + OFFSET_SEC;

            for (let i = 0; i < chart.length; i++) {
                let noteData = chart[i];
                if (!noteData.spawned && syncTime >= noteData.targetTime - fallTimeSec) {
                    let el = document.createElement('div');
                    el.classList.add('note');
                    document.getElementById(`lane-${noteData.lane}`).appendChild(el);
                    noteData.element = el;
                    noteData.spawned = true;
                    activeNotes.push(noteData);
                }
            }

            for (let i = activeNotes.length - 1; i >= 0; i--) {
                let note = activeNotes[i];
                let timeDiff = note.targetTime - syncTime; 

                if (timeDiff < -0.15) { 
                    note.element.remove();
                    activeNotes.splice(i, 1);
                    showFeedback('MISS', 'red');
                } else {
                    let progress = (fallTimeSec - timeDiff) / fallTimeSec;
                    let currentY = progress * judgmentY;
                    note.element.style.top = currentY + 'px';
                }
            }
            requestAnimationFrame(update);
        }

        function handleInput(laneIndex) {
            if (!gameActive) return;
            playTapSound(); 
            judge(laneIndex);
        }

        // スマホ・PCマウス入力
        document.querySelectorAll('.lane').forEach(lane => {
            lane.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleInput(parseInt(lane.dataset.lane));
            });
            lane.addEventListener('mousedown', () => {
                handleInput(parseInt(lane.dataset.lane));
            });
        });

        // PCキーボード入力
        const keys = { 'd': 0, 'k': 1 };
        document.addEventListener('keydown', (e) => {
            if (e.repeat) return; 
            
            // スペースキーまたはエンターキーでゲーム開始
            if (!gameActive && (e.code === 'Space' || e.code === 'Enter')) {
                startGame();
                return;
            }

            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) {
                handleInput(keys[key]);
            }
        });

        function judge(laneIndex) {
            let syncTime = bgm.currentTime + OFFSET_SEC;
            let laneNotes = activeNotes.filter(n => n.lane === laneIndex);
            if (laneNotes.length === 0) return;

            laneNotes.sort((a, b) => Math.abs(a.targetTime - syncTime) - Math.abs(b.targetTime - syncTime));
            let targetNote = laneNotes[0];
            let diff = Math.abs(targetNote.targetTime - syncTime); 

            if (diff < 0.1) { 
                showFeedback('PERFECT!!', '#00ffcc');
                score += 100;
                hitNote(targetNote);
            } else if (diff < 0.18) { 
                showFeedback('GOOD', 'orange');
                score += 50;
                hitNote(targetNote);
            }
        }

        function hitNote(note) {
            note.element.style.backgroundColor = 'white';
            note.element.style.boxShadow = '0 0 20px white';
            setTimeout(() => {
                if (note.element.parentNode) note.element.remove();
            }, 50);
            
            let index = activeNotes.indexOf(note);
            if(index > -1) activeNotes.splice(index, 1);
            
            scoreDisplay.innerText = score;
        }

        function showFeedback(text, color) {
            feedbackDisplay.innerText = text;
            feedbackDisplay.style.color = color;
            clearTimeout(window.feedbackTimer);
            window.feedbackTimer = setTimeout(() => { feedbackDisplay.innerText = ''; }, 400);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スマホ対応2レーン音ゲー (譜面レコーダー搭載)</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent; 
        }
        #start-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #start-btn {
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            background-color: #00ccff;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,204,255,0.5);
        }
        #game-board {
            position: relative;
            width: 100%;
            max-width: 400px; 
            /* レコーディングエリアのスペースを空けるため少し高さを縮めます */
            height: 65vh; 
            background-color: #222;
            display: flex;
        }
        .lane {
            position: relative;
            flex: 1; 
            height: 100%;
            border-right: 1px dashed #444;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        .lane:last-child { border-right: none; }

        #judgment-line {
            position: absolute;
            bottom: 15%;
            width: 100%;
            height: 5px;
            background-color: rgba(255, 255, 255, 0.5);
            z-index: 10;
        }
        
        .note {
            position: absolute;
            width: 60px;
            height: 60px;
            left: 50%; 
            margin-left: -30px; 
            background-image: url('dog.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transform: translateY(-50%);
        }

        #ui-layer {
            position: absolute;
            top: 10px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            z-index: 20;
            pointer-events: none; 
        }
        #score-board { font-size: 24px; font-weight: bold; }
        #feedback { height: 30px; font-size: 24px; font-weight: bold; color: yellow; margin-top: 5px; text-shadow: 0 0 5px #000; }
        
        .tap-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 15%;
            background-color: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #888;
        }
        .lane:active .tap-area {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* 📝 レコーディング用のUIスタイル */
        #record-ui {
            width: 100%;
            max-width: 400px;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #record-text {
            width: 100%;
            height: 100px;
            background: #333;
            color: #00ffcc;
            border: 1px solid #55

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スマホ対応2レーン音ゲー (譜面レコーダー搭載)</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent; 
        }
        #start-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #start-btn {
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            background-color: #00ccff;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,204,255,0.5);
        }
        #game-board {
            position: relative;
            width: 100%;
            max-width: 400px; 
            /* レコーディングエリアのスペースを空けるため少し高さを縮めます */
            height: 65vh; 
            background-color: #222;
            display: flex;
        }
        .lane {
            position: relative;
            flex: 1; 
            height: 100%;
            border-right: 1px dashed #444;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        .lane:last-child { border-right: none; }

        #judgment-line {
            position: absolute;
            bottom: 15%;
            width: 100%;
            height: 5px;
            background-color: rgba(255, 255, 255, 0.5);
            z-index: 10;
        }
        
        .note {
            position: absolute;
            width: 60px;
            height: 60px;
            left: 50%; 
            margin-left: -30px; 
            background-image: url('dog.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transform: translateY(-50%);
        }

        #ui-layer {
            position: absolute;
            top: 10px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            z-index: 20;
            pointer-events: none; 
        }
        #score-board { font-size: 24px; font-weight: bold; }
        #feedback { height: 30px; font-size: 24px; font-weight: bold; color: yellow; margin-top: 5px; text-shadow: 0 0 5px #000; }
        
        .tap-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 15%;
            background-color: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #888;
        }
        .lane:active .tap-area {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* 📝 レコーディング用のUIスタイル */
        #record-ui {
            width: 100%;
            max-width: 400px;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #record-text {
            width: 100%;
            height: 100px;
            background: #333;
            color: #00ffcc;
            border: 1px solid #555;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            resize: none;
        }
        #copy-btn {
            margin-top: 10px;
            padding: 10px 30px;
            background: #ffcc00;
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-btn">GAME START</button>
        <p style="margin-top:20px; color:#ccc;">画面の左右をタップ<br>（PCは D / K キー、またはスペース）</p>
    </div>

    <div id="ui-layer">
        <div id="score-board">SCORE: <span id="score">0</span></div>
        <div id="feedback"></div>
    </div>

        <div class="lane" id="lane-0" data-lane="0"><div class="tap-area">TAP (L)</div></div>
        <div class="lane" id="lane-1" data-lane="1"><div class="tap-area">TAP (R)</div></div>
        <div id="judgment-line"></div>
    </div>

        <textarea id="record-text" readonly placeholder="ゲーム中にタップすると記録が始まります"></textarea>
        <button id="copy-btn">コピーする</button>

    <audio id="bgm" src="easy.mp3"></audio>

{ time: 85.39, lane: 0 },
{ time: 88.88, lane: 0 },
{ time: 88.90, lane: 1 }

        const fallTimeSec = 1.0; 
        const OFFSET_SEC = 0.0;     

        const gameBoard = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score');
        const feedbackDisplay = document.getElementById('feedback');
        const bgm = document.getElementById('bgm');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const recordText = document.getElementById('record-text');
        const copyBtn = document.getElementById('copy-btn');
        
        let score = 0;
        let chart = [];       
        let activeNotes = []; 
        let gameActive = false;
        
        // 📝 記録用の配列
        let recordedData = [];
        
        let boardHeight = gameBoard.clientHeight;
        let judgmentY = boardHeight * 0.85; 

        let audioCtx;
        let tapBuffer = null; // SEデータを保存しておく変数

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // se.mp3を読み込んで準備しておく（遅延ゼロで鳴らすための処理）
                fetch('se.mp3')
                    .then(response => response.arrayBuffer())
                    .then(buffer => audioCtx.decodeAudioData(buffer))
                    .then(decodedData => {
                        tapBuffer = decodedData;
                    })
                    .catch(e => console.log("SE読み込みエラー:", e));
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTapSound() {
            if (!audioCtx || !tapBuffer) return; // 準備ができていなければ鳴らさな
            
            const source = audioCtx.createBufferSource();
            source.buffer = tapBuffer;
            
            // SEの音量調整用
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 1.0; // 1.0が元の音量。うるさければ0.5などに下げてください
            
            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            source.start(0);
        }

        window.addEventListener('resize', () => {
            boardHeight = gameBoard.clientHeight;
            judgmentY = boardHeight * 0.85;
        });

        function loadCustomChart() {
            chart = myCustomChart.map(data => {
                return {
                    targetTime: data.time,
                    lane: data.lane,
                    spawned: false,
                    element: null
                };
            });
            chart.sort((a, b) => a.targetTime - b.targetTime);
        }

        function startGame() {
            if (gameActive) return; 
            
            initAudio(); 
            startScreen.style.display = 'none';
            score = 0;
            scoreDisplay.innerText = score;
            
            // レコーディングデータをリセット
            recordedData = [];
            recordText.value = "";
            
            activeNotes.forEach(note => {
                if (note.element && note.element.parentNode) {
                    note.element.remove();
                }
            });
            activeNotes = []; 

            loadCustomChart(); 
            
            gameActive = true;
            bgm.currentTime = 0;
            bgm.play();
            
            requestAnimationFrame(update);
        }

        startBtn.addEventListener('click', startGame);
        startBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startGame();
        });

        bgm.addEventListener('ended', () => {
            gameActive = false;
            showFeedback('FINISH!', '#fff');
            
            setTimeout(() => {
                startScreen.style.display = 'flex';
            }, 2000);
        });

        function update() {
            if (!gameActive) return;
            let syncTime = bgm.currentTime + OFFSET_SEC;

            for (let i = 0; i < chart.length; i++) {
                let noteData = chart[i];
                if (!noteData.spawned && syncTime >= noteData.targetTime - fallTimeSec) {
                    let el = document.createElement('div');
                    el.classList.add('note');
                    document.getElementById(`lane-${noteData.lane}`).appendChild(el);
                    noteData.element = el;
                    noteData.spawned = true;
                    activeNotes.push(noteData);
                }
            }

            for (let i = activeNotes.length - 1; i >= 0; i--) {
                let note = activeNotes[i];
                let timeDiff = note.targetTime - syncTime; 

                if (timeDiff < -0.15) { 
                    note.element.remove();
                    activeNotes.splice(i, 1);
                    showFeedback('MISS', 'red');
                } else {
                    let progress = (fallTimeSec - timeDiff) / fallTimeSec;
                    let currentY = progress * judgmentY;
                    note.element.style.top = currentY + 'px';
                }
            }
            requestAnimationFrame(update);
        }

        function handleInput(laneIndex) {
            if (!gameActive) return;
            playTapSound(); 
            
            // 📝 ここで叩いた時間を記録！
            // 小数点第2位までに丸めて配列の形式にする
            let tapTime = (bgm.currentTime + OFFSET_SEC).toFixed(2);
            let dataString = `{ time: ${tapTime}, lane: ${laneIndex} }`;
            recordedData.push(dataString);
            
            // テキストエリアに表示して一番下までスクロール
            recordText.value = recordedData.join(",\n");
            recordText.scrollTop = recordText.scrollHeight;

            judge(laneIndex);
        }

        document.querySelectorAll('.lane').forEach(lane => {
            lane.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleInput(parseInt(lane.dataset.lane));
            });
            lane.addEventListener('mousedown', () => {
                handleInput(parseInt(lane.dataset.lane));
            });
        });

        const keys = { 'd': 0, 'k': 1 };
        document.addEventListener('keydown', (e) => {
            if (e.repeat) return; 
            if (!gameActive && (e.code === 'Space' || e.code === 'Enter')) {
                startGame();
                return;
            }
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) {
                handleInput(keys[key]);
            }
        });

        function judge(laneIndex) {
            let syncTime = bgm.currentTime + OFFSET_SEC;
            let laneNotes = activeNotes.filter(n => n.lane === laneIndex);
            if (laneNotes.length === 0) return;

            laneNotes.sort((a, b) => Math.abs(a.targetTime - syncTime) - Math.abs(b.targetTime - syncTime));
            let targetNote = laneNotes[0];
            let diff = Math.abs(targetNote.targetTime - syncTime); 

            if (diff < 0.1) { 
                showFeedback('PERFECT!!', '#00ffcc');
                score += 100;
                hitNote(targetNote);
            } else if (diff < 0.18) { 
                showFeedback('GOOD', 'orange');
                score += 50;
                hitNote(targetNote);
            }
        }

        function hitNote(note) {
            note.element.style.filter = 'brightness(200%)';
            setTimeout(() => {
                if (note.element.parentNode) note.element.remove();
            }, 50);
            
            let index = activeNotes.indexOf(note);
            if(index > -1) activeNotes.splice(index, 1);
            
            scoreDisplay.innerText = score;
        }

        function showFeedback(text, color) {
            feedbackDisplay.innerText = text;
            feedbackDisplay.style.color = color;
            clearTimeout(window.feedbackTimer);
            window.feedbackTimer = setTimeout(() => { feedbackDisplay.innerText = ''; }, 400);
        }

        // 📋 コピーボタンの処理
        copyBtn.addEventListener('click', () => {
            if (recordText.value === "") {
                alert("まだ記録されたデータがありません！");
                return;
            }
            navigator.clipboard.writeText(recordText.value).then(() => {
                alert("コピーしました！\nコード内の myCustomChart の中に貼り付けてください。");
            }).catch(err => {
                alert("コピーに失敗しました。手動でテキストを選択してコピーしてください。");
            });
        });

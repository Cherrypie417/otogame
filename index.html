<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スマホ対応2レーン音ゲー (SE・ズレ調整版)</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent; 
        }
        #start-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #start-btn {
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            background-color: #00ccff;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,204,255,0.5);
        }
        #game-board {
            position: relative;
            width: 100%;
            max-width: 400px; 
            height: 100%;
            background-color: #222;
            display: flex;
        }
        .lane {
            position: relative;
            flex: 1; 
            height: 100%;
            border-right: 1px dashed #444;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        .lane:last-child { border-right: none; }

        #judgment-line {
            position: absolute;
            bottom: 15%;
            width: 100%;
            height: 5px;
            background-color: rgba(255, 255, 255, 0.5);
            z-index: 10;
        }
        .note {
            position: absolute;
            width: 80%;
            height: 18px;
            background-color: #00ffcc;
            left: 10%; 
            border-radius: 4px;
            box-shadow: 0 0 8px rgba(0,255,204,0.8);
            transform: translateY(-50%);
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            z-index: 20;
            pointer-events: none; 
        }
        #score-board { font-size: 28px; font-weight: bold; }
        #feedback { height: 35px; font-size: 28px; font-weight: bold; color: yellow; margin-top: 5px; text-shadow: 0 0 5px #000; }
        
        .tap-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 15%;
            background-color: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #888;
        }
        .lane:active .tap-area {
            background-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-btn">GAME START</button>
        <p style="margin-top:20px; color:#ccc;">画面の左右をタップ<br>（PCは D / K キー）</p>
    </div>

    <div id="ui-layer">
        <div id="score-board">SCORE: <span id="score">0</span></div>
        <div id="feedback"></div>
    </div>
    
    <div id="game-board">
        <div class="lane" id="lane-0" data-lane="0"><div class="tap-area">TAP (L)</div></div>
        <div class="lane" id="lane-1" data-lane="1"><div class="tap-area">TAP (R)</div></div>
        <div id="judgment-line"></div>
    </div>

    <audio id="bgm" src="radio_6890.mp3"></audio>

    <script>
        // ==========================================
        // ⚙️ ゲームの各種設定
        // ==========================================
        const BPM = 120;             
        const fallTimeSec = 1.0; // ノーツが落ちてくる時間
        
        // ⏱️ 音ズレ調整（秒数）
        // 音楽よりノーツが「遅れて」降ってくる場合はプラス（例: 0.1）
        // 音楽よりノーツが「早く」降ってくる場合はマイナス（例: -0.1）
        const OFFSET_SEC = 0.0;     
        // ==========================================

        const gameBoard = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score');
        const feedbackDisplay = document.getElementById('feedback');
        const bgm = document.getElementById('bgm');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        
        let score = 0;
        let chart = [];       
        let activeNotes = []; 
        let gameActive = false;
        
        let boardHeight = gameBoard.clientHeight;
        let judgmentY = boardHeight * 0.85; 

        // 🔊 Web Audio API（遅延ゼロのタップ音用）
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // タップした時に短い「ポッ」という音を鳴らす
        function playTapSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sine'; // 音の種類（sine, square, sawtooth, triangle）
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05); // ピッチを下げる
            
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05); // 音量をすばやく減衰
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.05);
        }

        window.addEventListener('resize', () => {
            boardHeight = gameBoard.clientHeight;
            judgmentY = boardHeight * 0.85;
        });

        // 🎼 リズムパターンを使った譜面生成（最大3連打）
        function generateChart() {
            chart = [];
            const secPerBeat = 60 / BPM;              
            const secPerMeasure = secPerBeat * 4;     
            const totalMeasures = 100;                

            // 音楽的に自然なノーツの配置パターン（1小節=16分割）
            // 最大でも3連打までしか入らないように設計しています
            const patterns = [
                [0, 4, 8, 12],
